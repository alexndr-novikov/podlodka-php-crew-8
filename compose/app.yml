services:
  app:
    build:
      context: ..
      dockerfile: docker/frankenphp/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - path: ./app.env
        required: true
      - path: ./app.env.local
        required: false
    environment:
      SERVER_NAME: ":8080"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-workshop}:${POSTGRES_PASSWORD:-workshop}@postgres:5432/${POSTGRES_DB:-workshop}?serverVersion=${POSTGRES_VERSION:-17}&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "redis://valkey:6379/messages"
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379}
      MEILI_URL: ${MEILI_URL:-http://meilisearch:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-workshop-meili-key}
      MAILER_DSN: ${MAILER_DSN:-smtp://mailpit:1025}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://localstack:4566}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-workshop}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-workshop}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-workshop-uploads}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      FRANKENPHP_WORKER_CONFIG: watch
    volumes:
      - ../:/app
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - workshop
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    post_start:
      - command: chown -R www-data:www-data /app/var
      - command: php bin/console cache:warmup
        user: www-data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.workshop.localhost`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.services.app.loadbalancer.server.port=8080"
    develop:
      watch:
        - action: sync
          path: ../src
          target: /app/src
          ignore:
            - "*.test.php"
        - action: sync
          path: ../templates
          target: /app/templates
        - action: sync
          path: ../config
          target: /app/config
        - action: rebuild
          path: ../composer.json
        - action: rebuild
          path: ../composer.lock

  worker-messenger:
    extends:
      service: app
    restart: unless-stopped
    command: ["php", "bin/console", "messenger:consume", "async", "--time-limit=3600", "-vv"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels: !reset []
    post_start: !reset []
    develop: !reset
      watch: []

volumes:
  caddy-data:
  caddy-config:

